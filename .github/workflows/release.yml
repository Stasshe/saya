name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Compute new version
        id: version
        run: |
          current=$(awk -F'"' '/^\[package\]/{p=1} p && /^version/{print $2; exit}' Cargo.toml)
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          new="${major}.${minor}.${patch}"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "tag=v${new}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml version
        run: |
          awk -v old="version = \"${{ steps.version.outputs.current }}\"" \
              -v new="version = \"${{ steps.version.outputs.new }}\"" '
            /^\[package\]/ { p = 1 }
            p && $0 == old { $0 = new; p = 0 }
            { print }
          ' Cargo.toml > Cargo.toml.new
          mv Cargo.toml.new Cargo.toml

      - name: Refresh Cargo.lock
        run: cargo check

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

  upload-assets:
    needs: bump-version
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: saya
          target: ${{ matrix.target }}
          archive: saya-$tag-$target
          ref: refs/tags/${{ needs.bump-version.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload checksum
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          archive="saya-${{ needs.bump-version.outputs.tag }}-${{ matrix.target }}.tar.gz"
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          gh release download "${{ needs.bump-version.outputs.tag }}" \
            --pattern "$archive" \
            --dir "$tmp_dir"
          (cd "$tmp_dir" && sha256sum "$archive" > "$archive.sha256")
          gh release upload "${{ needs.bump-version.outputs.tag }}" \
            "$tmp_dir/$archive.sha256" \
            --clobber
